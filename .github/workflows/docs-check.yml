name: Docs Check

on:
  push:
    branches: [main, windows-native]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # vibe-doc reads git history for classification + staleness

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Scan rebuilds .vibe-doc/state.json fresh from the current tree so the
      # check never runs against stale local state. The committed profile.json
      # seeds the classifier with our project context (desktop widget, not a
      # web app).
      - name: Scan project
        run: npx -y @esthernandez/vibe-doc@0.4.0 scan . --profile .vibe-doc/profile.json

      # Check returns exit 0 when Required docs are present and current, exit 1
      # otherwise. CI gates on that exit code.
      - name: Check Required docs
        run: npx -y @esthernandez/vibe-doc@0.4.0 check .
